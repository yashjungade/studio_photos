<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upgrader - Professional Image Enhancement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 20px;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .upload-section {
            padding: 40px 30px;
            text-align: center;
        }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 10px;
            padding: 40px;
            margin: 20px 0;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f9f9f9;
        }
        .upload-area:hover {
            border-color: #4facfe;
            background: #f0f8ff;
        }
        .upload-area.dragover {
            border-color: #00f2fe;
            background: #e6f7ff;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-icon {
            font-size: 3rem;
            color: #666;
            margin-bottom: 15px;
        }
        .upload-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }
        .upload-subtext {
            color: #999;
            font-size: 0.9rem;
        }
        .upload-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .results {
            display: none;
            padding: 40px 30px;
        }
        .results h3 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 1.8rem;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .image-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .image-card:hover {
            transform: translateY(-5px);
        }
        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .image-card .card-content {
            padding: 15px;
        }
        .image-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .download-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s ease;
        }
        .download-btn:hover {
            background: #218838;
        }
        .error {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .upload-area {
                padding: 20px;
            }
            .image-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Photo Upgrader</h1>
            <p>Transform your product images with AI-powered studio shots</p>
        </div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">Drag & drop your image here or click to browse</div>
                <div class="upload-subtext">Supported formats: JPG, PNG, JPEG (Max 10MB)</div>
                <input type="file" name="image" id="imageInput" accept="image/*" required>
            </div>
            <button type="button" class="upload-btn" id="uploadBtn">Upload & Process Image</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your image... This may take a few moments.</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <h3>Your Enhanced Images</h3>
            <div class="image-grid" id="imageGrid"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const imageGrid = document.getElementById('imageGrid');

        // Drag and drop functionality
        uploadArea.addEventListener('click', () => imageInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imageInput.files = files;
            }
        });

        imageInput.addEventListener('change', () => {
            if (imageInput.files.length > 0) {
                uploadArea.querySelector('.upload-text').textContent = `Selected: ${imageInput.files[0].name}`;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            if (!imageInput.files[0]) {
                showError('Please select an image first.');
                return;
            }

            const formData = new FormData();
            formData.append('image', imageInput.files[0]);

            showLoading();
            hideError();
            hideResults();

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (res.ok) {
                    displayResults(data);
                } else {
                    showError(data.error || 'An error occurred while processing the image.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                hideLoading();
            }
        });

        function showLoading() {
            loading.style.display = 'block';
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
        }

        function hideError() {
            error.style.display = 'none';
        }

        function hideResults() {
            results.style.display = 'none';
        }

        function displayResults(data) {
            console.log('used_stability:', data.used_stability);
            imageGrid.innerHTML = '';

            const images = [
                { title: 'Original Image', src: data.original, download: false },
                { title: 'Background Removed', src: data.no_bg, download: true },
                { title: 'Enhanced Version', src: data.enhanced, download: true, note: data.used_stability === false ? 'Advanced enhancement credits utilized, using basic enhancement' : '' }
            ];

            images.forEach(img => {
                const card = document.createElement('div');
                card.className = 'image-card';

                card.innerHTML = `
                    <img src="${img.src}" alt="${img.title}" loading="lazy">
                    <div class="card-content">
                        <h4>${img.title}</h4>
                        ${img.note ? `<p style="font-size: 0.9rem; color: #ff6b6b; margin: 5px 0; font-weight: bold;">${img.note}</p>` : ''}
                        ${img.download ? `<button class="download-btn" onclick="downloadImage('${img.src}', '${img.title.replace(/\s+/g, '_').toLowerCase()}.jpg')">Download</button>` : ''}
                    </div>
                `;

                imageGrid.appendChild(card);
            });

            results.style.display = 'block';
        }

        function downloadImage(src, filename) {
            const link = document.createElement('a');
            link.href = src;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
